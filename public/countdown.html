        function getQuoteOfTheDay() {
            let startDate = new Date("2025-03-31"); // Start date of this script
            let today = new Date();
            let dayDiff = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            let quoteIndex = dayDiff % quotes.length;
            document.getElementById("quote").innerText = quotes[quoteIndex];
        }

        function countdown() {
            let targetDate = new Date("June 30, 2027 23:59:59").getTime();
            let now = new Date().getTime();
            let distance = targetDate - now;

            let days = Math.floor(distance / (1000 * 60 * 60 * 24));
            let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = `Time Left: ${days} Days ${hours} Hours ${minutes} Minutes ${seconds} Seconds`;
        }

        function changeBackgroundColor() {
            const colors = ["#09090b", "#111111", "#18181b", "#1f1f24", "#111827", "#1c1917"];
            document.body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        }

        getQuoteOfTheDay();
        countdown();
        changeBackgroundColor();
        setInterval(countdown, 1000); // Update countdown every second
