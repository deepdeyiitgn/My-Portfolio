name: ✨ Feature Request
description: Suggest a new improvement for the portfolio project
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for the suggestion! Feature requests are reviewed and may have delayed response due to the current academic hiatus (JEE Advanced 2027).

        Please describe your idea clearly and explain the specific problem it solves.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this has not been requested before
          required: true
        - label: This feature is consistent with the existing Dark-Amber design language
          required: false
        - label: This is a focused, incremental improvement (not a complete redesign)
          required: false

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of the site does this feature relate to?
      options:
        - Home / Landing page
        - About / Me / Now pages
        - Projects / Project Detail
        - Portfolio (PDF viewer)
        - Journal / Journal View / Journal Embed
        - Live Stream page
        - Links / Proof pages
        - Contact / FAQ pages
        - Dashboard (CMS)
        - Navigation / Header / Footer
        - SEO / Performance
        - i18n / Language support
        - API / Backend
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem or limitation does this feature solve? Be specific.
      placeholder: "When viewing a journal on mobile, there is no way to quickly jump back to the journal listing — the user has to use the browser's back button or re-navigate via the header."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see. Be as specific as possible.
      placeholder: "Add a sticky 'Back to Journal' button that appears at the bottom of the page on mobile, visible after scrolling past the title."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you thought of other ways to solve this? What did you reject and why?
      placeholder: "I considered using the header's Journal nav link, but it requires scrolling back to the top of the page."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, references to similar implementations, or any other useful context
    validations:
      required: false
